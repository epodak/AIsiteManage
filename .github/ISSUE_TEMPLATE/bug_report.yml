name: 🐞 反馈缺陷 Bug Report
description: 反馈问题缺陷或异常行为 | Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写此 Bug 报告！如果您觉得 Ophel 对您有帮助，请给项目点个 Star 🌟
        Thanks for taking the time to fill out this bug report! If Ophel helps you, please give it a Star 🌟

        > [!NOTE]
        > - ⚠️ 本项目由个人维护，**问题修复不等于一定会实现**（取决于复现难度和精力）。
        > - ⚠️ 修复优先级会综合评估项目整体情况。
        > - ⚠️ **情绪化或命令式表达**不会提高优先级。
        >
        > 请确认你理解以上说明后再提交 Issue。

  - type: checkboxes
    id: checklist
    attributes:
      label: 前置检查 | Essential Checklist
      options:
        - label: 我已阅读并理解项目的问题反馈与边界说明 | I have read and understood the project's instructions
          required: true
        - label: 我已在 Issue 中搜索过类似问题，确认这不是一个重复问题 | I have searched for existing issues and confirmed this is not a duplicate
          required: true
        - label: 我理解如果未提供清晰的复现步骤或环境信息，Issue 可能会被关闭 | I understand that the issue may be closed if missing reproduction steps or environment info
          required: true
        - label: 我确认使用的是插件的最新版本 | I confirm I am using the latest version of the extension
          required: true
        - label: 我已为项目点了 Star 🌟 | I have starred the project 🌟
          required: false

  - type: dropdown
    id: installation_type
    attributes:
      label: 安装方式 | Installation Type
      description: 您是如何安装 Ophel 的？ | How did you install Ophel?
      options:
        - Browser Extension (浏览器扩展)
        - Userscript (油猴脚本)
    validations:
      required: true

  - type: dropdown
    id: userscript_manager
    attributes:
      label: 脚本管理器 | Userscript Manager
      description: 如果使用油猴脚本，请选择 | Required if using Userscript
      options:
        - Tampermonkey
        - Violentmonkey
        - Greasemonkey
        - Userscripts (Safari)
        - Stay
        - Other
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 扩展版本 | Extension Version
      description: 请在扩展管理中查看 (e.g. v1.0.0) | Check in extension manager
      placeholder: v1.0.0
    validations:
      required: true

  - type: dropdown
    id: ai_platform
    attributes:
      label: AI 平台 | AI Platform
      description: 出问题的平台是哪个？ | Which platform is having issues?
      options:
        - Gemini (gemini.google.com)
        - Gemini Enterprise (business.gemini.google)
        - ChatGPT (chatgpt.com)
        - Claude (claude.ai)
        - Grok (grok.com)
        - AI Studio (aistudio.google.com)
        - DeepSeek (chat.deepseek.com)
        - Doubao (www.doubao.com)
        - Kimi (www.kimi.com)
        - ChatGLM (chatglm.cn)
        - Z.ai (chat.z.ai)
        - Qianwen (www.qianwen.com)
        - QwenAI (chat.qwen.ai)
        - ima (ima.qq.com)
        - Yuanbao (yuanbao.tencent.com)
        - All Platforms (所有平台)
        - Other (其他)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: 浏览器 | Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - Other
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: 浏览器版本 | Browser Version
      placeholder: e.g. 120.0.6099.130
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: 系统环境 | Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Other
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: 问题描述 | Bug Description
      description: 请清晰描述遇到的问题 | A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 复现步骤 | Steps to Reproduce
      description: 请提供详细的复现步骤 | Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: 预期与实际行为 | Expected vs Actual Behavior
      description: 您期望发生什么 vs 实际发生了什么？ | What did you expect vs what happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 | Screenshots
      description: 拖拽可上传图片 | Drop images here to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: console_errors
    attributes:
      label: 控制台报错 | Console Errors
      description: 请粘贴 F12 控制台的红色报错 | Paste any errors from DevTools Console (F12).
      render: shell
    validations:
      required: false
