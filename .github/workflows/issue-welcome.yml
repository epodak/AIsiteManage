name: Issue Welcome

on:
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Welcome & Star Reminder
        uses: actions/github-script@v8
        with:
          script: |
            const username = context.actor;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 0. Check if owner
            if (username === owner) {
              console.log(`Issue opened by owner (${username}), skipping welcome message.`);
              return;
            }

            const issueTitle = context.payload.issue.title || "";

            // 1. Language Detection (Title based)
            // Check if title contains Chinese characters.
            const isChinese = /[\u4e00-\u9fa5]/.test(issueTitle);

            console.log(`User: ${username}, Language detected: ${isChinese ? 'Chinese' : 'English'}`);

            // 2. Check if user has starred the repo
            // Use the documented "list repositories starred by a user" API.
            // If the check fails, fall back to a neutral welcome message instead of
            // incorrectly assuming the user has not starred the repository.
            let hasStarred = null;
            try {
              const targetFullName = `${owner}/${repo}`.toLowerCase();

              for await (const response of github.paginate.iterator(
                github.rest.activity.listReposStarredByUser,
                {
                  username,
                  per_page: 100
                }
              )) {
                const found = response.data.some(
                  (starredRepo) => starredRepo.full_name?.toLowerCase() === targetFullName
                );

                if (found) {
                  hasStarred = true;
                  break;
                }
              }

              if (hasStarred !== true) {
                hasStarred = false;
              }
            } catch (error) {
              console.log("Error checking star status:", error);
            }

            console.log(`User ${username} star status: ${hasStarred}`);

            // 3. Construct Comment
            let body = "";

            if (isChinese) {
              if (hasStarred === true) {
                body = `👋 感谢您提交 Issue！\n\n我们会尽快查看。感谢您的支持！`;
              } else if (hasStarred === false) {
                body = `👋 感谢您提交 Issue！\n\n我们会尽快查看。如果您觉得 **Ophel** 对您有帮助，请考虑给项目点个 Star 🌟，这对我们非常重要！`;
              } else {
                body = `👋 感谢您提交 Issue！\n\n我们会尽快查看。感谢您的关注与支持！`;
              }
            } else {
              // English
              if (hasStarred === true) {
                 body = `👋 Thanks for opening an issue!\n\nWe will look into it soon. Thanks for your support!`;
              } else if (hasStarred === false) {
                 body = `👋 Thanks for opening an issue!\n\nWe will look into it soon. If **Ophel** is helpful to you, please consider giving the repo a Star 🌟. It means a lot!`;
              } else {
                 body = `👋 Thanks for opening an issue!\n\nWe will look into it soon. Thanks for your support!`;
              }
            }

            // 4. Post Comment
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: body
            });
